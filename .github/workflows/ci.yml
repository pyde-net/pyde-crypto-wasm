name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new push lands.
# Saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # Lib-only because the parity test in `src/lib.rs` dev-depends
      # on `pyde-rust-sdk`, which currently has pre-existing compile
      # errors unrelated to this crate. Re-enable `--all-targets`
      # once `pyde-rust-sdk` builds clean.
      - run: cargo clippy --lib -- -D warnings

  build-wasm:
    name: wasm-pack build (web + nodejs targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      # The actual ship-path: a CI failure here means real users hit
      # a broken `wasm-pack build`, not a hypothetical lint nit.
      - run: wasm-pack build --target web --release
      - run: wasm-pack build --target nodejs --release
